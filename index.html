<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus - Personal Execution Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #08080d;
  --bg-secondary: #0f0f18;
  --bg-card: rgba(255,255,255,0.03);
  --bg-card-hover: rgba(255,255,255,0.06);
  --bg-glass: rgba(255,255,255,0.04);
  --border-subtle: rgba(255,255,255,0.06);
  --border-card: rgba(255,255,255,0.08);
  --border-active: rgba(255,255,255,0.14);
  --text-primary: #f0efe9;
  --text-secondary: #a09e95;
  --text-muted: #5c5a55;
  --text-dim: #3a3835;
  --accent-amber: #d9a34a;
  --accent-amber-soft: rgba(217,163,74,0.15);
  --accent-amber-glow: rgba(217,163,74,0.25);
  --accent-coral: #d46a4a;
  --accent-coral-soft: rgba(212,106,74,0.15);
  --accent-green: #5a9e6f;
  --accent-green-soft: rgba(90,158,111,0.15);
  --accent-blue: #6a8fba;
  --accent-blue-soft: rgba(106,143,186,0.12);
  --accent-purple: #9b7ec4;
  --accent-purple-soft: rgba(155,126,196,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 40px rgba(217,163,74,0.08);
  --font-display: 'Outfit', 'Noto Sans SC', system-ui, sans-serif;
  --font-body: 'Noto Sans SC', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', monospace;
  --sidebar-width: 200px;
  --transition-fast: 150ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-smooth: 300ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100dvh;display:flex;overflow:hidden}
input,textarea,button,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}

/* ========== SIDEBAR ========== */
.sidebar{width:var(--sidebar-width);height:100dvh;background:var(--bg-secondary);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:8px}
.app-logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent-amber),var(--accent-coral));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px var(--accent-amber-glow);flex-shrink:0}
.app-logo-icon svg{width:15px;height:15px}
.app-name{font-family:var(--font-display);font-size:1.1rem;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary)}
.app-tagline{font-size:0.65rem;color:var(--text-muted);white-space:nowrap}

.user-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-subtle)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent-blue),var(--accent-amber));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:0.75rem;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:0.78rem;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-status{font-size:0.65rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.sidebar-nav{flex:1;padding:8px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);font-size:0.78rem;color:var(--text-secondary);transition:all var(--transition-fast);cursor:pointer;font-weight:500;white-space:nowrap}
.nav-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.nav-item.active{background:var(--accent-amber-soft);color:var(--accent-amber);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:14px;border-radius:2px;background:var(--accent-amber)}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--accent-coral-soft);color:var(--accent-coral);font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center}

.sidebar-footer{padding:8px 14px 14px;border-top:1px solid var(--border-subtle)}
.streak-mini{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg-glass);border-radius:var(--radius-sm);border:1px solid var(--border-subtle);margin-bottom:8px}
.streak-flame{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent-amber),var(--accent-coral));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.streak-flame svg{width:12px;height:12px}
.streak-info{flex:1;min-width:0}
.streak-count{font-family:var(--font-display);font-size:0.85rem;font-weight:700;color:var(--text-primary)}
.streak-label{font-size:0.62rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.settings-btn{display:flex;align-items:center;gap:6px;width:100%;padding:6px 10px;border-radius:var(--radius-sm);font-size:0.72rem;color:var(--text-muted);transition:all var(--transition-fast)}
.settings-btn:hover{background:var(--bg-card-hover);color:var(--text-secondary)}
.settings-btn svg{width:14px;height:14px;opacity:0.6}

.lang-switch{display:flex;gap:1px;margin-bottom:8px;background:var(--bg-glass);border-radius:100px;padding:2px;border:1px solid var(--border-subtle)}
.lang-pill{flex:1;padding:3px 4px;border-radius:100px;font-size:0.62rem;font-weight:600;text-align:center;color:var(--text-muted);transition:all var(--transition-fast);cursor:pointer}
.lang-pill:hover{color:var(--text-secondary)}
.lang-pill.active{background:var(--accent-amber-soft);color:var(--accent-amber)}

/* ========== MAIN CONTENT ========== */
.main-content{flex:1;height:100dvh;overflow-y:auto;overflow-x:hidden;padding:28px 32px}
.page-view{display:none;flex-direction:column;gap:22px;min-height:100%}
.page-view.active{display:flex}

/* ========== SHARED COMPONENTS ========== */
.dashboard-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.greeting-block{flex:1}
.greeting-text{font-family:var(--font-display);font-size:1.75rem;font-weight:700;letter-spacing:-0.03em;color:var(--text-primary);line-height:1.2}
.greeting-sub{font-size:0.85rem;color:var(--text-muted);margin-top:4px}
.date-display{text-align:right;flex-shrink:0}
.date-day{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;line-height:1}
.date-weekday{font-size:0.78rem;color:var(--text-secondary);margin-top:2px}

.bi-divider{color:var(--text-dim);margin:0 3px;font-size:0.65em;opacity:0.5}

.card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-xl);padding:22px;backdrop-filter:blur(20px);transition:all var(--transition-smooth)}
.card:hover{border-color:var(--border-active);box-shadow:var(--shadow-card)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:var(--font-display);font-size:0.95rem;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.card-title-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.card-title-dot.amber{background:var(--accent-amber);box-shadow:0 0 8px var(--accent-amber-glow)}
.card-title-dot.coral{background:var(--accent-coral);box-shadow:0 0 8px rgba(212,106,74,0.3)}
.card-title-dot.green{background:var(--accent-green);box-shadow:0 0 8px rgba(90,158,111,0.3)}
.card-title-dot.blue{background:var(--accent-blue);box-shadow:0 0 8px rgba(106,143,186,0.3)}
.card-title-dot.purple{background:var(--accent-purple);box-shadow:0 0 8px rgba(155,126,196,0.3)}

.focus-card{background:linear-gradient(135deg,rgba(217,163,74,0.08),rgba(212,106,74,0.05));border:1px solid rgba(217,163,74,0.2);border-radius:var(--radius-xl);padding:24px;position:relative;overflow:hidden;min-height:170px;display:flex;flex-direction:column;justify-content:center;transition:all var(--transition-smooth)}
.focus-card::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(217,163,74,0.1),transparent 70%);border-radius:50%}
.focus-card-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent-amber);font-weight:600;margin-bottom:6px}
.focus-task-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;line-height:1.3;position:relative;z-index:1}
.focus-task-empty{font-size:1rem;color:var(--text-muted);position:relative;z-index:1}
.focus-task-actions{display:flex;gap:8px;margin-top:14px;position:relative;z-index:1}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:100px;font-size:0.8rem;font-weight:600;transition:all var(--transition-fast);white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent-amber),#c8913a);color:#0a0a0f;box-shadow:0 2px 12px var(--accent-amber-glow)}
.btn-primary:hover{box-shadow:0 4px 20px var(--accent-amber-glow);transform:translateY(-1px)}
.btn-secondary{background:var(--bg-glass);border:1px solid var(--border-card);color:var(--text-secondary)}
.btn-secondary:hover{border-color:var(--border-active);color:var(--text-primary);background:var(--bg-card-hover)}
.btn-sm{padding:4px 10px;font-size:0.72rem}
.btn-xs{padding:2px 7px;font-size:0.65rem;border-radius:5px}
.btn-icon{width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-muted);transition:all var(--transition-fast)}
.btn-icon:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.btn-icon svg{width:14px;height:14px}

.priority-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:0.65rem;font-weight:600}
.priority-high{background:var(--accent-coral-soft);color:var(--accent-coral)}
.priority-medium{background:var(--accent-amber-soft);color:var(--accent-amber)}
.priority-low{background:var(--accent-blue-soft);color:var(--accent-blue)}

.status-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:100px;font-size:0.65rem;font-weight:600}
.status-pending{background:rgba(255,255,255,0.05);color:var(--text-muted)}
.status-progress{background:var(--accent-amber-soft);color:var(--accent-amber)}
.status-done{background:var(--accent-green-soft);color:var(--accent-green)}

.task-list{display:flex;flex-direction:column;gap:5px;max-height:360px;overflow-y:auto}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:var(--radius-md);transition:all var(--transition-fast);cursor:pointer}
.task-item:hover{background:var(--bg-card-hover);border-color:var(--border-card)}
.task-item.completed{opacity:0.5}
.task-item.completed .task-item-title{text-decoration:line-through}
.task-checkbox{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-active);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast)}
.task-checkbox:hover{border-color:var(--accent-green)}
.task-item.completed .task-checkbox{background:var(--accent-green);border-color:var(--accent-green)}
.task-checkbox svg{width:9px;height:9px;display:none}
.task-item.completed .task-checkbox svg{display:block}
.task-item-content{flex:1;min-width:0}
.task-item-title{font-size:0.83rem;font-weight:500;color:var(--text-primary)}
.task-item-meta{display:flex;align-items:center;gap:7px;margin-top:2px}
.task-item-date{font-size:0.68rem;color:var(--text-muted)}
.task-item-actions{display:flex;gap:3px;opacity:0;transition:opacity var(--transition-fast)}
.task-item:hover .task-item-actions{opacity:1}

.overdue-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(212,106,74,0.08);border:1px solid rgba(212,106,74,0.2);border-radius:var(--radius-lg);margin-bottom:4px}
.overdue-banner-icon{width:32px;height:32px;border-radius:50%;background:var(--accent-coral-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.overdue-banner-text{flex:1;font-size:0.82rem;color:var(--accent-coral)}
.overdue-banner-text strong{color:var(--text-primary)}

.quick-idea-bar{display:flex;gap:8px;background:var(--bg-glass);border:1px solid var(--border-card);border-radius:100px;padding:5px 5px 5px 16px;align-items:center;transition:all var(--transition-fast)}
.quick-idea-bar:focus-within{border-color:var(--accent-amber);box-shadow:0 0 0 3px var(--accent-amber-soft)}
.quick-idea-input{flex:1;background:none;border:none;outline:none;font-size:0.83rem;color:var(--text-primary);padding:5px 0}
.quick-idea-input::placeholder{color:var(--text-muted)}

.timeline{display:flex;flex-direction:column;gap:0;max-height:360px;overflow-y:auto}
.timeline-item{display:flex;gap:12px;padding:9px 0;position:relative}
.timeline-dot{width:9px;height:9px;border-radius:50%;background:var(--border-active);flex-shrink:0;margin-top:5px;position:relative;z-index:1}
.timeline-item.current .timeline-dot{background:var(--accent-amber);box-shadow:0 0 10px var(--accent-amber-glow)}
.timeline-item.done .timeline-dot{background:var(--accent-green)}
.timeline-line{position:absolute;left:3px;top:14px;bottom:0;width:2px;background:var(--border-subtle)}
.timeline-item:last-child .timeline-line{display:none}
.timeline-content{flex:1}
.timeline-time{font-size:0.68rem;color:var(--text-muted);font-family:var(--font-mono)}
.timeline-title{font-size:0.82rem;font-weight:500;color:var(--text-primary);margin-top:1px}

.tasks-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-pill{padding:5px 12px;border-radius:100px;font-size:0.75rem;font-weight:500;color:var(--text-muted);border:1px solid var(--border-subtle);transition:all var(--transition-fast);cursor:pointer}
.filter-pill:hover{border-color:var(--border-active);color:var(--text-secondary)}
.filter-pill.active{background:var(--accent-amber-soft);border-color:var(--accent-amber);color:var(--accent-amber)}
.search-input{flex:1;min-width:160px;padding:7px 14px;background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:100px;font-size:0.82rem;color:var(--text-primary);outline:none;transition:all var(--transition-fast)}
.search-input:focus{border-color:var(--accent-amber)}
.search-input::placeholder{color:var(--text-muted)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity var(--transition-smooth)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-secondary);border:1px solid var(--border-card);border-radius:var(--radius-xl);padding:26px;width:90%;max-width:500px;transform:translateY(20px) scale(0.97);transition:transform var(--transition-spring);box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700;margin-bottom:18px;color:var(--text-primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:0.75rem;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em}
.form-input,.form-textarea,.form-select{width:100%;padding:9px 12px;background:var(--bg-glass);border:1px solid var(--border-card);border-radius:var(--radius-md);font-size:0.83rem;color:var(--text-primary);outline:none;transition:border-color var(--transition-fast)}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent-amber)}
.form-textarea{resize:vertical;min-height:70px}
.form-select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23a09e95' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* ========== IDEAS GRID ========== */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.idea-card{background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px;transition:all var(--transition-smooth);cursor:pointer;display:flex;flex-direction:column}
.idea-card:hover{border-color:var(--border-card);background:var(--bg-card-hover);transform:translateY(-2px)}
.idea-content{font-size:0.83rem;color:var(--text-primary);line-height:1.5;flex:1}
.idea-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-subtle)}
.idea-tags{display:flex;gap:3px;flex-wrap:wrap}
.idea-tag{font-size:0.63rem;padding:2px 7px;border-radius:100px;background:var(--accent-blue-soft);color:var(--accent-blue)}
.idea-date{font-size:0.65rem;color:var(--text-dim)}
.idea-card-actions{display:flex;gap:3px;opacity:0;transition:opacity var(--transition-fast)}
.idea-card:hover .idea-card-actions{opacity:1}
.convert-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:100px;font-size:0.65rem;font-weight:600;background:var(--accent-amber-soft);color:var(--accent-amber);transition:all var(--transition-fast)}
.convert-btn:hover{background:var(--accent-amber);color:#0a0a0f}

/* ========== INSPIRATION CARDS ========== */
.inspiration-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.insp-card{background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:20px;transition:all var(--transition-smooth);display:flex;flex-direction:column;position:relative;overflow:hidden}
.insp-card:hover{border-color:var(--border-card);background:var(--bg-card-hover);transform:translateY(-2px);box-shadow:var(--shadow-card)}
.insp-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;opacity:0;transition:opacity var(--transition-smooth)}
.insp-card:hover::after{opacity:1}
.insp-card.douyin::after{background:linear-gradient(90deg,#ff0050,#00f2ea)}
.insp-card.bilibili::after{background:linear-gradient(90deg,#fb7299,#23ade5)}

.insp-platform{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.insp-platform-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#fff}
.insp-platform-icon.douyin{background:#ff0050}
.insp-platform-icon.bilibili{background:#fb7299}
.insp-platform-name{font-size:0.72rem;font-weight:600;color:var(--text-secondary)}
.insp-title{font-size:0.92rem;font-weight:600;color:var(--text-primary);line-height:1.4;margin-bottom:10px}
.insp-stats{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.insp-stat{text-align:center}
.insp-stat-value{font-family:var(--font-display);font-size:0.95rem;font-weight:700;color:var(--text-primary)}
.insp-stat-label{font-size:0.62rem;color:var(--text-muted)}
.insp-recreate{font-size:0.75rem;color:var(--accent-amber);background:var(--accent-amber-soft);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:14px;line-height:1.4}
.insp-recreate strong{color:var(--accent-amber)}
.insp-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.insp-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;font-size:0.7rem;font-weight:600;transition:all var(--transition-fast);cursor:pointer;border:1px solid var(--border-card);color:var(--text-secondary)}
.insp-btn:hover{border-color:var(--border-active);color:var(--text-primary);background:var(--bg-card-hover)}
.insp-btn.saved{background:var(--accent-amber-soft);border-color:var(--accent-amber);color:var(--accent-amber)}
.insp-refresh-hint{font-size:0.7rem;color:var(--text-dim);margin-top:4px}

/* ========== ENGLISH LEARNING ========== */
.english-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;flex:1;min-height:0}
@media(max-width:900px){.english-layout{grid-template-columns:1fr}}
.english-sidebar{display:flex;flex-direction:column;gap:12px}
.english-lesson-list{display:flex;flex-direction:column;gap:4px;max-height:500px;overflow-y:auto}
.english-lesson-item{padding:10px 12px;border-radius:var(--radius-md);font-size:0.8rem;cursor:pointer;transition:all var(--transition-fast);border:1px solid transparent;color:var(--text-secondary)}
.english-lesson-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.english-lesson-item.active{background:var(--accent-amber-soft);border-color:rgba(217,163,74,0.3);color:var(--accent-amber);font-weight:600}
.english-lesson-item .lesson-title{font-weight:600;margin-bottom:2px}
.english-lesson-item .lesson-meta{font-size:0.68rem;color:var(--text-muted)}

.english-main{display:flex;flex-direction:column;gap:16px;flex:1}
.english-sentence-card{background:var(--bg-glass);border:1px solid var(--border-card);border-radius:var(--radius-lg);padding:20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;text-align:center}
.english-sentence-en{font-family:var(--font-display);font-size:1.4rem;font-weight:600;color:var(--text-primary);line-height:1.5;margin-bottom:8px}
.english-sentence-zh{font-size:0.95rem;color:var(--text-muted);line-height:1.4}
.english-hidden{filter:blur(8px);user-select:none;transition:filter var(--transition-smooth)}
.english-hidden:not(:hover){filter:blur(8px)}
.english-sentence-num{font-size:0.7rem;color:var(--text-dim);margin-bottom:12px}
.english-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.english-control-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:100px;font-size:0.78rem;font-weight:600;transition:all var(--transition-fast);cursor:pointer;border:1px solid var(--border-card)}
.english-control-btn.active{border-color:var(--accent-amber);background:var(--accent-amber-soft);color:var(--accent-amber)}
.english-recording{animation:pulse-rec 1.5s infinite}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:0.5}}
.english-progress-bar{height:4px;background:var(--bg-glass);border-radius:2px;overflow:hidden;margin-top:8px}
.english-progress-fill{height:100%;background:var(--accent-amber);border-radius:2px;transition:width 0.3s linear}

/* ========== DEV VIEW ========== */
.dev-layout{display:flex;flex-direction:column;gap:16px}
.dev-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.dev-color-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.dev-color-swatch{width:32px;height:32px;border-radius:50%;border:2px solid var(--border-active);flex-shrink:0;cursor:pointer;position:relative}
.dev-color-swatch input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dev-color-info{flex:1;min-width:0}
.dev-color-name{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-primary)}
.dev-color-value{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted)}
.dev-actions{display:flex;gap:10px;margin-top:8px}

/* ========== STATS & PROGRESS ========== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:18px;text-align:center;transition:all var(--transition-smooth)}
.stat-card:hover{border-color:var(--border-card)}
.stat-value{font-family:var(--font-display);font-size:1.8rem;font-weight:700;letter-spacing:-0.03em;color:var(--text-primary);line-height:1}
.stat-label{font-size:0.72rem;color:var(--text-muted);margin-top:5px}
.stat-card.highlight{border-color:rgba(217,163,74,0.3)}
.stat-card.highlight .stat-value{color:var(--accent-amber)}

.progress-section{margin-top:18px}
.progress-item{margin-bottom:14px}
.progress-header{display:flex;justify-content:space-between;margin-bottom:5px;font-size:0.78rem}
.progress-label{color:var(--text-secondary)}
.progress-value{font-weight:600;color:var(--text-primary);font-family:var(--font-mono)}
.progress-bar{height:5px;background:var(--bg-glass);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width var(--transition-smooth)}
.progress-fill.amber{background:var(--accent-amber)}
.progress-fill.green{background:var(--accent-green)}
.progress-fill.coral{background:var(--accent-coral)}

.streak-calendar{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.streak-day{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--bg-glass);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--text-dim);transition:all var(--transition-fast)}
.streak-day.active{background:var(--accent-amber-soft);border-color:var(--accent-amber);color:var(--accent-amber);font-weight:700}
.streak-day.today{border-color:var(--accent-amber);box-shadow:0 0 0 2px var(--accent-amber-soft)}

/* ========== TOAST ========== */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 18px;background:var(--bg-secondary);border:1px solid var(--border-card);border-radius:var(--radius-lg);font-size:0.82rem;color:var(--text-primary);box-shadow:var(--shadow-card);animation:toastIn var(--transition-spring);display:flex;align-items:center;gap:8px}
.toast-success{border-left:3px solid var(--accent-green)}
.toast-warning{border-left:3px solid var(--accent-amber)}
.toast-error{border-left:3px solid var(--accent-coral)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ========== EMPTY STATE ========== */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty-state-text{font-size:0.9rem;color:var(--text-muted);margin-bottom:10px}

/* ========== UTILITY ========== */
.flex-center{display:flex;align-items:center;justify-content:center}
.mt-2{margin-top:6px}.mt-3{margin-top:10px}
.text-center{text-align:center}
.text-sm{font-size:0.78rem}.text-xs{font-size:0.65rem}
.text-muted{color:var(--text-muted)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.page-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary)}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);z-index:50;transition:transform var(--transition-smooth)}
  .sidebar.mobile-open{transform:translateX(0)}
  .main-content{padding:16px 14px}
  .dashboard-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .ideas-grid{grid-template-columns:1fr}
  .inspiration-grid{grid-template-columns:1fr}
  .english-layout{grid-template-columns:1fr}
  .dev-color-grid{grid-template-columns:1fr}
.mobile-menu-btn{display:flex!important}
}
.mobile-menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:60;width:36px;height:36px;border-radius:50%;background:var(--bg-secondary);border:1px solid var(--border-card);align-items:center;justify-content:center;color:var(--text-secondary)}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
}
</style>
</head>
<body>

<!-- Mobile Menu Toggle -->
<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<!-- ============ SIDEBAR ============ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="app-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="3" x2="12" y2="8"/>
      </svg>
    </div>
    <div><div class="app-name">Focus</div><div class="app-tagline" data-i18n="app.tagline">执行教练</div></div>
  </div>
  <div class="user-card">
    <div class="user-avatar" id="userInitials">凉</div>
    <div class="user-info">
      <div class="user-name" id="displayName">凉皮</div>
      <div class="user-status" data-i18n="user.status">Stay focused.</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span data-i18n="nav.dashboard">仪表盘</span>
      <span class="nav-badge" id="overdueCount" style="display:none">0</span>
    </div>
    <div class="nav-item" data-view="tasks" onclick="switchView('tasks')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span data-i18n="nav.tasks">任务</span>
    </div>
    <div class="nav-item" data-view="ideas" onclick="switchView('ideas')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span data-i18n="nav.ideas">想法</span>
    </div>
    <div class="nav-item" data-view="inspiration" onclick="switchView('inspiration')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <span data-i18n="nav.inspiration">灵感</span>
    </div>
    <div class="nav-item" data-view="english" onclick="switchView('english')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <span data-i18n="nav.english">英语</span>
    </div>
    <div class="nav-item" data-view="progress" onclick="switchView('progress')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span data-i18n="nav.progress">进度</span>
    </div>
    <div class="nav-item" data-view="dev" onclick="switchView('dev')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span data-i18n="nav.dev">开发者</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="lang-switch">
      <div class="lang-pill active" data-lang="zh" onclick="setLanguage('zh')">中</div>
      <div class="lang-pill" data-lang="en" onclick="setLanguage('en')">EN</div>
      <div class="lang-pill" data-lang="bilingual" onclick="setLanguage('bilingual')">双</div>
    </div>
    <div class="streak-mini" id="streakMini">
      <div class="streak-flame">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>
      </div>
      <div class="streak-info">
        <div class="streak-count" id="streakDays">0天</div>

      <span data-i18n="nav.settings">设置</span>
    </button>
  </div>
</aside>

<!-- ============ MAIN CONTENT ============ -->
<main class="main-content" id="mainContent" onclick="if(document.getElementById('sidebar').classList.contains('mobile-open'))document.getElementById('sidebar').classList.remove('mobile-open')">

  <!-- DASHBOARD VIEW -->
  <div class="page-view active" id="view-dashboard">
    <div class="dashboard-header">
      <div class="greeting-block">
        <div class="greeting-text" id="greetingText"></div>
        <div class="greeting-sub" id="greetingSub"></div>
      </div>
      <div class="date-display">
        <div class="date-day" id="dateDay"></div>
        <div class="date-weekday" id="dateWeekday"></div>
      </div>
    </div>
    <div class="overdue-banner" id="overdueBanner" style="display:none">
      <div class="overdue-banner-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-coral)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="overdue-banner-text" id="overdueBannerText"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:18px;flex:1">
      <div class="focus-card" id="focusCard">
        <div class="focus-card-label" data-i18n="focus.label">今日焦点</div>
        <div class="focus-task-empty" id="focusTaskDisplay"></div>
        <div class="focus-task-actions" id="focusActions"></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="card-title-dot amber"></span><span data-i18n="plan.title">今日计划</span></div>
          <div style="display:flex;gap:6px"><button class="btn btn-secondary btn-sm" onclick="autoPlanDay()" data-i18n="plan.autoPlan">智能规划</button><button class="btn btn-primary btn-sm" onclick="quickAddTask()">+</button></div>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
      <div class="card" id="overdueCard">
        <div class="card-header"><div class="card-title"><span class="card-title-dot coral"></span><span data-i18n="overdue.title">需关注</span></div></div>
        <div class="task-list" id="overdueTaskList" style="max-height:300px"></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><span class="card-title-dot blue"></span><span data-i18n="quickCapture.title">快速捕获</span></div></div>
        <div class="quick-idea-bar" style="margin-bottom:10px">
          <input type="text" class="quick-idea-input" id="quickIdeaInput" data-i18n-placeholder="quickCapture.placeholder" onkeydown="if(event.key==='Enter'){quickAddIdea();event.target.value=''}">
          <button class="btn btn-primary btn-sm" onclick="quickAddIdea()" data-i18n="quickCapture.save">保存</button>
        </div>
        <div class="task-list" id="recentIdeas" style="max-height:180px"></div>
      </div>
    </div>
  </div>

  <!-- TASKS VIEW -->
  <div class="page-view" id="view-tasks">
    <div class="page-header">
      <div class="page-title" data-i18n="tasks.title">任务</div>
      <button class="btn btn-primary" onclick="openTaskModal()" data-i18n="tasks.newTask">+ 新建</button>
    </div>
    <div class="tasks-toolbar" style="margin-top:6px">
      <input type="text" class="search-input" id="taskSearch" data-i18n-placeholder="tasks.search" oninput="renderTaskList()">
      <button class="filter-pill active" data-filter="all" onclick="setTaskFilter('all',this)" data-i18n="tasks.filter.all">全部</button>
      <button class="filter-pill" data-filter="pending" onclick="setTaskFilter('pending',this)" data-i18n="tasks.filter.pending">待办</button>
      <button class="filter-pill" data-filter="in_progress" onclick="setTaskFilter('in_progress',this)" data-i18n="tasks.filter.in_progress">进行中</button>
      <button class="filter-pill" data-filter="completed" onclick="setTaskFilter('completed',this)" data-i18n="tasks.filter.completed">已完成</button>
      <button class="filter-pill" data-filter="overdue" onclick="setTaskFilter('overdue',this)" data-i18n="tasks.filter.overdue">逾期</button>
    </div>
    <div class="task-list" id="fullTaskList" style="max-height:none"></div>
  </div>

  <!-- IDEAS VIEW -->
  <div class="page-view" id="view-ideas">
    <div class="page-header">
      <div class="page-title" data-i18n="ideas.title">想法</div>
      <button class="btn btn-primary" onclick="openIdeaModal()" data-i18n="ideas.newIdea">+ 新想法</button>
    </div>
    <div class="ideas-grid" id="ideasGrid"></div>
  </div>

  <!-- INSPIRATION VIEW -->
  <div class="page-view" id="view-inspiration">
    <div class="page-header">
      <div class="page-title" data-i18n="insp.title">灵感发现</div>
      <div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="regenerateInspiration()" data-i18n="insp.refresh">刷新灵感</button></div>
    </div>
    <div style="color:var(--text-muted);font-size:0.78rem" data-i18n="insp.desc">每日自动更新各平台热门视频，助你发现二创机会</div>
    <div class="inspiration-grid" id="inspirationGrid"></div>
    <div class="insp-refresh-hint" data-i18n="insp.hint">灵感每日自动更新  ·  点击「收藏」保存到想法  ·  点击「加入任务」立刻行动</div>
  </div>

  <!-- ENGLISH VIEW -->
  <div class="page-view" id="view-english">
    <div class="page-header">
      <div class="page-title" data-i18n="eng.title">英语练习</div>
    </div>
    <div class="english-layout">
      <div class="english-sidebar">
        <div class="card" style="flex:1">
          <div class="card-header"><div class="card-title"><span class="card-title-dot green"></span><span data-i18n="eng.lessons">课程列表</span></div></div>
          <div class="english-lesson-list" id="englishLessonList"></div>
        </div>
      </div>
      <div class="card english-main" style="flex:1">
        <div style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap">
          <button class="english-control-btn" id="engBtnBlind" onclick="toggleBlindMode()" data-i18n="eng.blind">盲听</button>
          <button class="english-control-btn" id="engBtnReveal" onclick="revealEnglishText()" data-i18n="eng.reveal">显示原文</button>
          <button class="english-control-btn" onclick="playEnglishAudio()" data-i18n="eng.play">播放</button>
          <button class="english-control-btn" id="engBtnShadow" onclick="toggleShadowMode()" data-i18n="eng.shadow">跟读</button>
          <button class="english-control-btn" onclick="nextEnglishSentence(1)" data-i18n="eng.next">下一句</button>
          <button class="english-control-btn" onclick="nextEnglishSentence(-1)" data-i18n="eng.prev">上一句</button>
        </div>
        <div class="english-sentence-card" id="englishSentenceCard">
          <div class="english-sentence-num" id="englishSentenceNum"></div>
          <div class="english-sentence-en" id="englishSentenceEn"></div>
          <div class="english-sentence-zh" id="englishSentenceZh"></div>
        </div>
        <div id="englishRecorder" style="display:none;text-align:center;color:var(--accent-coral);font-weight:600;font-size:0.9rem" class="english-recording">
          <span data-i18n="eng.recording">录制中...</span> <span id="engRecordTimer">00:00</span>

let currentLang='zh';

function t(key,p={}){
  const e=I18N[key];if(!e)return key;
  if(currentLang==='bilingual'){const en=rp(e.en,p),zh=rp(e.zh,p);return en===zh?en:`${zh}<span class="bi-divider">|</span>${en}`}
  return rp(e[currentLang]||e.en,p);
}
function tp(key,p={}){
  const e=I18N[key];if(!e)return key;
  if(currentLang==='bilingual'){const en=rp(e.en,p),zh=rp(e.zh,p);return en===zh?en:`${zh} / ${en}`}
  return rp(e[currentLang]||e.en,p);
}
function rp(tmpl,p){let r=tmpl;for(const[k,v]of Object.entries(p))r=r.replace(new RegExp(`\\{${k}\\}`,'g'),v);return r}

function setLanguage(lang){
  currentLang=lang;appData.settings.lang=lang;saveData(appData);
  document.querySelectorAll('.lang-pill').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.lang-pill[data-lang="${lang}"]`)?.classList.add('active');
  applyLanguage();
}
function applyLanguage(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=t(el.getAttribute('data-i18n'))});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{el.placeholder=tp(el.getAttribute('data-i18n-placeholder'))});
  renderAll();
}

// DATA LAYER
// ============================================
const SK='focus_app_data_v2';

function defData(){return{
  tasks:[],ideas:[],dailyPlans:{},inspSaved:[],inspFavorites:[],
  settings:{name:'凉皮',reviewTime:'09:00',lang:'zh'},
  streak:{current:0,lastActiveDate:null,best:0,completedDates:[]},
  theme:{},english:{currentLesson:0,currentSentence:0,blindMode:false,shadowMode:false}
};}

function loadData(){try{const r=localStorage.getItem(SK);if(!r)return defData();const d=JSON.parse(r),df=defData();return{...df,...d,settings:{...df.settings,...d.settings},streak:{...df.streak,...d.streak},english:{...df.english,...(d.english||{})},theme:{...d.theme}}}catch(e){return defData()}}
function saveData(d){localStorage.setItem(SK,JSON.stringify(d))}

let appData=loadData();
currentLang=appData.settings.lang||'zh';

function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function today(){return new Date().toISOString().split('T')[0]}
function now(){return new Date().toISOString()}
function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/(86400000))}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString(currentLang==='en'?'en-US':'zh-CN',{month:'short',day:'numeric'})}
function fmtDateFull(iso){if(!iso)return'';return new Date(iso).toLocaleDateString(currentLang==='en'?'en-US':'zh-CN',{year:'numeric',month:'short',day:'numeric'})}
function isOverdue(ds){if(!ds)return false;return ds<today()}

// ============================================
// TASK CRUD
// ============================================
function getTasks(filter='all',search=''){
  let tks=[...appData.tasks];const q=search.toLowerCase();
  if(q)tks=tks.filter(t=>t.title.toLowerCase().includes(q)||(t.description&&t.description.toLowerCase().includes(q)));
  switch(filter){
    case'pending':return tks.filter(t=>t.status==='pending'&&!isOverdue(t.dueDate));
    case'in_progress':return tks.filter(t=>t.status==='in_progress');
    case'completed':return tks.filter(t=>t.status==='completed');
    case'overdue':return tks.filter(t=>t.status!=='completed'&&isOverdue(t.dueDate));
    case'today':return tks.filter(t=>t.status!=='completed'&&(t.dueDate===today()||isOverdue(t.dueDate)));
    default:return tks;
  }
}
function addTask(d){
  const task={id:uid(),title:d.title||'Untitled',description:d.description||'',status:'pending',priority:d.priority||'medium',dueDate:d.dueDate||'',category:d.category||'other',estimatedMinutes:parseInt(d.estimatedMinutes)||30,actualMinutes:null,isFocus:false,notes:'',createdAt:now(),completedAt:null};
  appData.tasks.unshift(task);saveData(appData);updateStreak('task_created');return task;
}
function updateTask(id,upd){
  const idx=appData.tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const task=appData.tasks[idx];if(upd.status==='completed'&&task.status!=='completed')upd.completedAt=now();
  Object.assign(task,upd);saveData(appData);
  if(upd.status==='completed')updateStreak('task_completed');
}
function deleteTask(id){
  appData.tasks=appData.tasks.filter(t=>t.id!==id);
  Object.keys(appData.dailyPlans).forEach(date=>{const p=appData.dailyPlans[date];p.scheduledTasks=p.scheduledTasks.filter(tid=>tid!==id);if(p.focusTaskId===id)p.focusTaskId=null});
  appData.ideas.forEach(i=>{if(i.convertedToTask===id)i.convertedToTask=null});
  saveData(appData);
}

// IDEA CRUD
// ============================================
function addIdea(content,tags=[]){
  const idea={id:uid(),content,tags:Array.isArray(tags)?tags:tags.split(',').map(t=>t.trim()).filter(Boolean),createdAt:now(),convertedToTask:null,source:null};
  appData.ideas.unshift(idea);saveData(appData);updateStreak('idea_added');return idea;
}
function deleteIdea(id){appData.ideas=appData.ideas.filter(i=>i.id!==id);saveData(appData)}
function convertIdeaToTask(ideaId){
  const idea=appData.ideas.find(i=>i.id===ideaId);if(!idea)return;
  const task=addTask({title:idea.content.slice(0,80),description:idea.content,priority:'medium',category:idea.tags[0]||'other',dueDate:today()});

function getTodayPlan(){
  const d=today();if(!appData.dailyPlans[d]){appData.dailyPlans[d]={focusTaskId:null,scheduledTasks:[],notes:'',completedAt:null};saveData(appData)}
  return appData.dailyPlans[d];
}
function setFocusTask(taskId){
  const plan=getTodayPlan();appData.tasks.forEach(t=>t.isFocus=false);
  const task=appData.tasks.find(t=>t.id===taskId);if(task){task.isFocus=true;plan.focusTaskId=taskId;saveData(appData)}
}
function autoPlanDay(){
  const plan=getTodayPlan();const overdue=getTasks('overdue'),todayT=appData.tasks.filter(t=>t.status!=='completed'&&t.dueDate===today());
  const pending=appData.tasks.filter(t=>t.status==='pending'&&!isOverdue(t.dueDate)&&t.dueDate!==today());
  const candidates=[...overdue,...todayT,...pending.filter(t=>t.priority==='high')];
  if(candidates.length===0){showToast(tp('toast.noTasksToPlan'),'warning');return}
  setFocusTask(candidates[0].id);plan.scheduledTasks=candidates.slice(0,6).map(t=>t.id);saveData(appData);
  overdue.forEach(t=>updateTask(t.id,{dueDate:today()}));updateStreak('plan_created');
  showToast(tp('toast.dayPlanned',{n:candidates.length}),'success');renderAll();
}

// ============================================
// STREAK
// ============================================
function updateStreak(action){
  const d=today(),sk=appData.streak;
  if(!sk.completedDates.includes(d))sk.completedDates.push(d);sk.completedDates.sort();
  let cur=1;for(let i=sk.completedDates.length-1;i>0;i--){if(daysBetween(sk.completedDates[i-1],sk.completedDates[i])<=1)cur++;else break}
  sk.current=cur;if(cur>sk.best)sk.best=cur;sk.lastActiveDate=d;saveData(appData);
}

function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className=`toast toast-${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='all 300ms ease';setTimeout(()=>t.remove(),300)},3000);
}

function seedRand(seed){
  let h=0;for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0}
  return function(){h=(h*16807)%2147483647;return(h-1)/2147483646;}
}
function getDailyInspirations(){
  const d=today(),rng=seedRand(d);const shuffled=[...INSPIRATION_POOL];
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]}
  return shuffled.slice(0,8).map((item,idx)=>({
    ...item,id:`insp-${d}-${idx}`,
    heat:Math.floor(item.h*(0.8+rng()*0.4)),
    peak:Math.floor(item.pk*(0.7+rng()*0.6)),
    growth:Math.floor(item.g*(0.8+rng()*0.4))
  }));
}

function renderDevView(){
  const grid=document.getElementById('devColorGrid'),rs=getComputedStyle(document.documentElement);
  grid.innerHTML=COLOR_VARS.map(v=>{
    const val=rs.getPropertyValue(v.name).trim()||appData.theme[v.name]||'';
    return`<div class="dev-color-row"><div class="dev-color-swatch" style="background:${val}"><input type="color" value="${val}" onchange="updateColorVar('${v.name}',this.value)"></div><div class="dev-color-info"><div class="dev-color-name">${v.name}</div><div class="dev-color-value">${v.label} · ${val}</div></div></div>`;
  }).join('');
}

function updateColorVar(name,value){
  document.documentElement.style.setProperty(name,value);
  if(value.startsWith('rgba')){
    // Update soft variants
    const m=value.match(/rgba\((\d+),\s*(\d+),\s*(\d+)/);
    if(m){const r=m[1],g=m[2],b=m[3];
      if(name.includes('amber')){document.documentElement.style.setProperty('--accent-amber-soft',`rgba(${r},${g},${b},0.15)`);document.documentElement.style.setProperty('--accent-amber-glow',`rgba(${r},${g},${b},0.25)`)}
      if(name.includes('coral'))document.documentElement.style.setProperty('--accent-coral-soft',`rgba(${r},${g},${b},0.15)`);
      if(name.includes('green'))document.documentElement.style.setProperty('--accent-green-soft',`rgba(${r},${g},${b},0.15)`);
      if(name.includes('blue'))document.documentElement.style.setProperty('--accent-blue-soft',`rgba(${r},${g},${b},0.12)`);
      if(name.includes('purple'))document.documentElement.style.setProperty('--accent-purple-soft',`rgba(${r},${g},${b},0.12)`);
    }
  }
  if(!appData.theme)appData.theme={};appData.theme[name]=value;saveData(appData);
}
function exportTheme(){
  const theme={};COLOR_VARS.forEach(v=>{theme[v.name]=getComputedStyle(document.documentElement).getPropertyValue(v.name).trim()});
  navigator.clipboard.writeText(JSON.stringify(theme,null,2)).then(()=>showToast(tp('toast.themeExported'),'success')).catch(()=>showToast('Copy failed','error'));
}
function importTheme(){
  try{
    const json=prompt(tp('dev.import')+' - JSON 数据：');if(!json)return;
    const theme=JSON.parse(json);
    Object.entries(theme).forEach(([k,v])=>{document.documentElement.style.setProperty(k,v);appData.theme[k]=v});
    saveData(appData);renderDevView();showToast(tp('toast.themeImported'),'success');
  }catch(e){showToast('Invalid JSON format','error')}
}
function resetTheme(){
  COLOR_VARS.forEach(v=>{document.documentElement.style.removeProperty(v.name);delete appData.theme[v.name]});
  // Reset soft variants
  ['--accent-amber-soft','--accent-amber-glow','--accent-coral-soft','--accent-green-soft','--accent-blue-soft','--accent-purple-soft'].forEach(v=>document.documentElement.style.removeProperty(v));
  appData.theme={};saveData(appData);renderDevView();showToast(tp('toast.themeReset'),'success');
}

function dailyAutoCheck(){
  const d=today(),lastCheck=localStorage.getItem('focus_last_daily_check');
  if(lastCheck!==d){
    // New day: auto-replan if there are overdue tasks
    const overdue=getTasks('overdue');
    if(overdue.length>=2){
      const plan=getTodayPlan();
      if(!plan.scheduledTasks||plan.scheduledTasks.length===0){
        autoPlanDay(); // Auto-plan on new day with overdue tasks
      }
    }
    // Update streak
    updateStreak('daily_check');
    localStorage.setItem('focus_last_daily_check',d);
    console.log('Focus: Daily auto-check completed for',d);
  }
}

function checkForOverdueReminders(){
  const overdue=getTasks('overdue');
  if(overdue.length>0&&Notification.permission==='granted'){
    const lastNotify=localStorage.getItem('focus_last_notify_date'),td=today();
    if(lastNotify!==td){
      new Notification(tp('notify.overdueTitle'),{
        body:tp('notify.overdueBody',{n:overdue.length}),
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23d9a34a"/></svg>'
      });
      localStorage.setItem('focus_last_notify_date',td);
    }
  }
}

function requestNotificationPermission(){
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
}

  dailyAutoCheck();
  requestNotificationPermission();
  setInterval(checkForOverdueReminders,30*60*1000);
  setTimeout(checkForOverdueReminders,3000);
  // Re-check at midnight
  const msUntilMidnight=new Date().setHours(24,0,0,0)-Date.now();
  setTimeout(()=>{dailyAutoCheck();setInterval(dailyAutoCheck,86400000)},msUntilMidnight+1000);
}

init();
</script>
